<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Premium amber gradient -->
    <linearGradient id="sparkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FBBF24" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#F59E0B" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Outer glow halo -->
  <circle cx="100" cy="100" r="90" fill="url(#glow)"/>
  <!-- Main 4-point spark with gradient -->
  <g filter="url(#softShadow)">
    <path
      d="M100 18
         L115 78
         Q117 88 127 90
         L182 100
         L127 110
         Q117 112 115 122
         L100 182
         L85 122
         Q83 112 73 110
         L18 100
         L73 90
         Q83 88 85 78
         Z"
      fill="url(#sparkGrad)"
    />
    <!-- Inner highlight for depth -->
    <path
      d="M100 50
         L108 90
         Q110 96 116 97
         L150 100
         L116 103
         Q110 104 108 110
         L100 150
         L92 110
         Q90 104 84 103
         L50 100
         L84 97
         Q90 96 92 90
         Z"
      fill="url(#innerGrad)"
      opacity="0.6"
    />
  </g>
  <!-- Sparkle accents -->
  <circle cx="155" cy="55" r="3" fill="#FEF3C7" opacity="0.9"/>
  <circle cx="45" cy="160" r="2" fill="#FEF3C7" opacity="0.7"/>
  <circle cx="165" cy="145" r="1.5" fill="#FCD34D" opacity="0.6"/>
</svg>
